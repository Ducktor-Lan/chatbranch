<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatBranch Settings</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        padding: 24px;
        font-family: "Segoe UI", "PingFang SC", sans-serif;
        background: #f1f5f9;
        color: #0f172a;
      }
      .wrap {
        max-width: 780px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 16px;
        font-size: 24px;
      }
      .field {
        margin: 0 0 16px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
      }
      input[type='text'],
      input[type='number'],
      select,
      textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 10px;
        font-size: 14px;
        font-family: inherit;
      }
      button {
        border: 0;
        border-radius: 8px;
        background: #0284c7;
        color: #ffffff;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #0369a1;
      }
      .hint {
        color: #334155;
        font-size: 13px;
      }
      .status {
        margin-top: 12px;
        font-size: 13px;
        color: #0369a1;
      }

      /* Prompts table styles */
      .prompts-section {
        margin-top: 8px;
      }
      .prompts-table {
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        overflow: hidden;
      }
      .prompts-header {
        display: grid;
        grid-template-columns: 140px 1fr 60px;
        background: #f8fafc;
        border-bottom: 1px solid #e2e8f0;
        font-weight: 600;
        font-size: 13px;
      }
      .prompts-header span {
        padding: 10px;
      }
      .prompts-list {
        max-height: 320px;
        overflow-y: auto;
      }
      .prompt-row {
        display: grid;
        grid-template-columns: 140px 1fr 60px;
        border-bottom: 1px solid #e2e8f0;
        align-items: center;
      }
      .prompt-row:last-child {
        border-bottom: none;
      }
      .prompt-row input {
        border: none;
        border-radius: 0;
        padding: 8px 10px;
        font-size: 13px;
        background: transparent;
      }
      .prompt-row input:focus {
        outline: none;
        background: #f8fafc;
      }
      .prompt-row input.prompt-title {
        border-right: 1px solid #e2e8f0;
        font-weight: 500;
      }
      .prompt-row input.prompt-content {
        border-right: 1px solid #e2e8f0;
      }
      .prompt-row .delete-btn {
        background: transparent;
        color: #ef4444;
        padding: 6px 10px;
        font-size: 12px;
      }
      .prompt-row .delete-btn:hover {
        background: #fef2f2;
      }
      .add-prompt-btn {
        margin-top: 10px;
        background: #f8fafc;
        color: #0284c7;
        border: 1px dashed #cbd5e1;
        padding: 8px 14px;
        font-size: 13px;
      }
      .add-prompt-btn:hover {
        background: #f1f5f9;
        border-color: #0284c7;
      }
      .empty-hint {
        padding: 20px;
        text-align: center;
        color: #94a3b8;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>ChatBranch Settings</h1>
      <div class="field">
        <label for="overlayTtlMs">Overlay Duration (ms)</label>
        <input id="overlayTtlMs" type="number" min="1000" step="500" />
      </div>
      <div class="field">
        <label>
          <input id="debugMode" type="checkbox" />
          Enable debug logs
        </label>
      </div>
      <div class="field">
        <label for="quickAskTarget">Quick Ask Target Site</label>
        <select id="quickAskTarget">
          <option value="same-site">Same as current site</option>
          <option value="chatgpt">ChatGPT</option>
          <option value="gemini">Gemini</option>
          <option value="m365">M365 Copilot</option>
          <option value="deepseek">DeepSeek</option>
        </select>
      </div>
      <div class="field prompts-section">
        <label>Common Command Library</label>
        <div class="prompts-table">
          <div class="prompts-header">
            <span>标题</span>
            <span>内容</span>
            <span>操作</span>
          </div>
          <div id="prompts-list" class="prompts-list"></div>
        </div>
        <button id="addPromptBtn" class="add-prompt-btn" type="button">+ 添加提示词</button>
        <div class="hint">点击标题按钮可快速插入对应内容到输入框。</div>
      </div>
      <button id="saveBtn" type="button">Save</button>
      <div id="status" class="status"></div>
    </div>
    <script src="options.js"></script>
  </body>
</html>
